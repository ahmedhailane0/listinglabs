name: Update ListingLabs site

# Forever-autonomous, $0 refresh:
#   • polls the BWEnews RSS feed for new listing signals
#   • re-pulls each token's GeckoTerminal candles up to "now" (charts stay live)
#   • rebuilds the static site and publishes it to GitHub Pages
#
# No API keys are used here — the build runs fully offline except for the public,
# keyless GeckoTerminal / CoinMarketCap-web / BWEnews endpoints. There is nothing
# secret in this workflow, so nothing secret can leak from it.

on:
  schedule:
    - cron: "*/20 * * * *"     # every ~20 min (GitHub may delay/skip; best-effort)
  workflow_dispatch: {}         # lets you run it by hand from the Actions tab
  push:
    branches: [main]            # rebuild on any code change you push

# Only one run at a time; a new run waits for the previous to finish.
concurrency:
  group: listinglabs-site
  cancel-in-progress: false

permissions:
  contents: write               # to commit the refreshed cache back to the repo
  pages: write                  # to publish to GitHub Pages
  id-token: write               # required by the Pages deploy action

# GitHub forces JS actions onto Node 24 on 2026-06-16 and removes Node 20 on
# 2026-09-16. Opt in now so every action (incl. the Pages actions, which have no
# Node-24 release yet) runs on Node 24 and the deprecation warnings stop.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: perps_correlation
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install --quiet requests plotly matplotlib

      - name: Refresh price candles (charts stay current)
        # GeckoTerminal rate-limits GitHub's shared IP hard, so each run refreshes only
        # a capped set (incremental: ~1 page each). WEIGHTED priority: the newest
        # REFRESH_NEWEST listings (QAIT, CTR, SLX…) refresh EVERY run so the actively-
        # watched charts stay current; the remaining slots round-robin the most-stale
        # of the older tokens. Dead on-chain pools (tracked in cache/refresh_skip.json)
        # sink to the back instead of burning the budget. The heavy one-time gap-fill
        # is done locally and committed, so CI only does cheap work.
        run: python refresh_klines.py
        env:
          REFRESH_LIMIT: "20"    # tokens touched per run (cap for the rate-limited IP)
          REFRESH_NEWEST: "8"    # of those, how many are the newest listings (priority).
                                 # Lowered 14->8 so the OLDER tail gets 12 slots/run
                                 # instead of 6 — ~halves its refresh cycle (it was
                                 # going multiple days stale) while total fetch volume
                                 # (REFRESH_LIMIT) is unchanged, respecting the
                                 # GeckoTerminal CI-IP throttle ceiling.
          REFRESH_WORKERS: "4"   # modest concurrency — GeckoTerminal rate-limits per IP
        continue-on-error: true   # a flaky pool must never block the build
        timeout-minutes: 10       # hard ceiling; each token writes as it goes, so a
                                  # timeout just means the rest resume on the next run

      - name: Refresh per-exchange perp OI + funding (Scam Watchlist)
        # Autonomous + keyless via CoinGecko's /derivatives aggregator — ONE call
        # that returns every exchange's perp OI + funding SERVER-SIDE, so GitHub's
        # geo-blocked runner IP (Binance/OKX/Bybit return 451 to datacenter IPs)
        # still gets all venues. Direct per-exchange fetching is local-only
        # (`fetch_perp_markets.py --direct`); the default path used here is CoinGecko.
        # build_scams stamps each page "via CoinGecko · as of <fetch time>".
        run: python fetch_perp_markets.py
        continue-on-error: true     # a flaky aggregator call must never block the build
        timeout-minutes: 5

      - name: Refresh Scam Watchlist prices + supply (charts stay current)
        # The full fetch_scam_data.py needs a local CSV + RootData key, so it can't
        # run in CI. This is the keyless price/supply subset: re-pulls CoinGecko
        # market data + 180d daily series and CMC's authoritative supply for every
        # token already in cache/scam_data.json. Without this, the watchlist charts
        # froze ~2 days behind (nothing refreshed scam_prices in the cron).
        run: python refresh_scam_prices.py
        env:
          SCAM_LIMIT: "13"   # tokens touched per run (CoinGecko 429s the CI IP).
                             # Walks MOST-STALE-FIRST and writes after every token,
                             # so each run advances the tail and a timeout just
                             # resumes next run. 26 tokens -> full cycle in ~2 runs.
        continue-on-error: true
        timeout-minutes: 6

      - name: Refresh top holders (Scam Watchlist)
        # Keyless multichain holders via GoPlus token-security (BNB Chain / Base /
        # ETH / …). Non-EVM chains gracefully report "unavailable".
        run: python fetch_holders.py
        continue-on-error: true
        timeout-minutes: 5

      - name: Fetch TGE dates (Manipulated tab)
        # Keyless CMC dateLaunched (the real launch; CoinGecko genesis / dateAdded
        # fallbacks) -> cache/scam_tge.json. Static per token + skips ones already
        # cached, so this only does work when a new watchlist token appears. Drives
        # the Manipulated report's TGE column/sort.
        run: python fetch_scam_tge.py
        continue-on-error: true
        timeout-minutes: 4

      - name: Refresh live FDV / market cap / supply (reactions tokens)
        # Keyless CMC detail per listings/*.json -> cache/token_market.json so the
        # reactions report's FDV/MC/supply match CoinMarketCap instead of the stale
        # hand-entered values. build_listing_report prefers these live numbers.
        run: python fetch_token_market.py
        continue-on-error: true
        timeout-minutes: 6

      - name: Fetch precise Binance perp-announce times (spike annotations)
        # Keyless Binance Futures CMS detail (publishDate, ms-precise) -> per token
        # cache/perp_announce.json. Drives the auto-generated "BN perp announce" Alpha
        # spike annotations. Static per token; only chases ones not already cached.
        run: python fetch_perp_announce.py
        continue-on-error: true
        timeout-minutes: 6

      - name: Sweep new CEX listings (candle-verified) + merge into configs
        # Catches major-venue listings that land AFTER a token's first sweep —
        # the gap that previously stayed invisible until a manual re-sweep. Self-
        # healing: sweep_venues re-probes venues cached as ABSENT (active tokens
        # daily) and NEVER caches a venue it couldn't reach (so a 451 can't hide a
        # real listing). --ci skips OKX/Bybit (they 451 GitHub's datacenter IP,
        # like the klines gap-fill); those stay LOCAL-only — run a plain
        # `python sweep_venues.py` locally to fill OKX/Bybit, then push. Newest
        # tokens first (they're the ones still gaining venues), capped per run.
        # merge_sweep only ADDS; curated / candle-verified events always win.
        run: |
          python sweep_venues.py --ci --limit 20
          python merge_sweep.py
        continue-on-error: true     # a flaky exchange call must never block the build
        timeout-minutes: 6

      - name: Build the site (RSS poll + reports + landing)
        run: python build_all.py --no-zip

      - name: Upload the site as a Pages artifact
        # Uploaded BEFORE the commit-back so the deploy always has its artifact, even
        # if persisting the refreshed cache hits a transient git race below.
        uses: actions/upload-pages-artifact@v3
        with:
          path: perps_correlation/Listinglabs

      - name: Commit refreshed data back to the repo
        # cache/   = accumulated candles (must persist between runs)
        # listings/ = venue events auto-added by apply_signals.py from BWEnews
        # Both must be committed so the autonomous state survives. Listinglabs/ is
        # redeployed as a Pages artifact every run (the git copy is never read by
        # deploy) and charts/ PNGs aren't regenerated here, so neither is committed —
        # that would be pure churn. The commit also keeps the scheduled workflow from
        # being auto-disabled for inactivity.
        #
        # Resilient push: a concurrent run (or a manual push) can advance main between
        # checkout and here, which previously made `git push` reject and FAIL THE BUILD
        # (so the deploy was skipped). Now we rebase onto origin/main and retry; and the
        # step is best-effort (continue-on-error) so persisting the cache can never block
        # the deploy.
        working-directory: .
        continue-on-error: true
        run: |
          git config user.name  "listinglabs-bot"
          git config user.email "actions@users.noreply.github.com"
          git add cache perps_correlation/listings
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "chore: auto-refresh candles + apply listing signals [skip ci]"
          for i in 1 2 3 4 5; do
            if git push; then
              echo "pushed on attempt $i"; exit 0
            fi
            echo "push rejected — rebasing onto origin/main (attempt $i)"
            git pull --rebase --autostash origin main || true
            sleep $(( (RANDOM % 5) + 2 ))
          done
          echo "::warning::could not push refreshed cache after retries; deploy continues"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
